<!DOCTYPE html>
<html lang="de">
<head>
  <meta charset="UTF-8" />
  <title>Zahlung</title>
</head>
<body>
  <h1>Executive Briefing</h1>
  <p>Vielen Dank für Ihr Interesse. Mit dem Klick unten starten Sie die Generierung Ihres persönlichen PDF-Briefings.</p>
  <button id="generate">Bezahlung abschließen</button>

  <script>
    document.getElementById("generate").addEventListener("click", async () => {
      const data = JSON.parse(sessionStorage.getItem("gpt_result"));
      const res = await fetch("https://make-ki-backend-production.up.railway.app/generate-pdf", {
        method: "POST",
        headers: {"Content-Type": "application/json"},
        body: JSON.stringify(data)
      });
      const result = await res.json();
      sessionStorage.setItem("pdf_url", result.pdf_url);

      // SEC-H2 (2026-04-27): Make.com-Webhook aus Client-Code entfernt.
      // Die URL war hardcoded und damit faktisch ein Bearer-Token,
      // jeder Anrufer konnte beliebige Mails triggern. Make.com-Scenario
      // wird Wolf-seitig deaktiviert, Webhook-URL rotiert.
      // TODO: Vor Go-Live durch Backend-Proxy ersetzen — siehe
      //   https://github.com/Wolf-Achtung/make-ki-frontend/issues  (Backend-Proxy für Make.com)
      // Pseudocode:
      //   await API.post('/notify/zahlung', { pdf_url: result.pdf_url, email: data.email });

      window.location.href = "danke.html";
    });
  </script>
</body>
</html>
